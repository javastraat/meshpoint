#
# Configuration file for Meshpoint concentrator service.
#
# This file ships in version control with sane defaults for every setting
# the app understands -- it's the reference for what's available. Put your
# own overrides in config/local.yaml (gitignored); only list the keys you
# want to change there, everything else falls back to what's here.
#

radio:                   # LoRa radio settings (concentrator + onboard SX1261)
  region: "US"
  # Frequency: set frequency_mhz (explicit MHz) OR slot (Meshtastic 1-indexed
  # slot number). frequency_mhz wins if both are present. If neither is set,
  # the regional default is used. Examples:
  #   frequency_mhz: 906.875
  #   slot: 20
  spreading_factor: 11
  bandwidth_khz: 250.0
  coding_rate: "4/5"
  sync_word: 0x2B
  preamble_length: 16
  tx_power_dbm: 22
  # Full-band spectrum sweep for the Hardware page spectrum card
  # (one ~50 ms scan per 100 kHz step; a few seconds per sweep).
  # 0 disables automatic sweeps ("Sweep now" button still works).
  spectrum_sweep_interval_seconds: 300
  # SPI device for the SX1261 companion radio used by spectral scan.
  # Empty disables it (default; spectral scan stays unavailable). On
  # RAK2287/RAK5146 this is usually unreachable from the Pi, but on the
  # SenseCap M1 setting "/dev/spidev0.1" has been verified to work.
  sx1261_spi_path: ""

meshtastic:               # Meshtastic protocol settings
  # Default channel PSK -- "AQ==" is Meshtastic's public "LongFast" default
  # key, used to decrypt any channel not listed under channel_keys below.
  default_key_b64: "AQ=="
  primary_channel_name: "LongFast"
  # channel_keys:
  #   MyChannel: "base64encodedPSK=="
  #   SecretChat: "anotherBase64PSK=="
  channel_keys: {}

meshcore:                 # MeshCore protocol settings
  # Blank trusts whatever key each channel already carries; MeshCore has
  # no single "default public key" the way Meshtastic's LongFast does.
  default_key_b64: "8b3387e9c5cdea6ac9e5edbaa115cd72"
  channel_keys: {}
  # private_channels:
  #   - "MyChannel"
  private_channels: []
  # Legacy, pre-v0.7.7: fallback advert name for the FIRST companion only.
  # New setups should use capture.meshcore_usb[i].companion_name instead.
  companion_name: null

capture:                  # what packet sources to read from
  sources: []
  # Single-stick Meshtastic USB (legacy). Ignored once capture.serial below
  # is non-empty.
  serial_port: null
  serial_baud: 115200
  concentrator_spi_device: "/dev/spidev0.0"
  # meshcore_usb is a list -- one entry per physical companion (up to 4).
  # A single companion still just needs one entry; label/companion_name
  # are optional and only matter once more than one is connected.
  meshcore_usb:
    - serial_port: null       # null + auto_detect finds /dev/ttyACM*/ttyUSB*
      baud_rate: 115200
      auto_detect: true
      label: ""
      companion_name: null   # optional, per-companion advert name
  # serial is opt-in -- only needed for more than one Meshtastic USB stick
  # (e.g. one on 433 MHz, one on 868 MHz). A single stick keeps using the
  # legacy serial_port/serial_baud scalars above instead.
  serial: []
  # serial:
  #   - serial_port: "/dev/ttyUSB0"
  #     label: "433"
  #   - serial_port: "/dev/ttyUSB1"
  #     label: "868"

storage:                  # database retention and cleanup
  database_path: "data/concentrator.db"
  # Oldest rows are pruned once a table exceeds this count.
  max_packets_retained: 100000
  max_telemetry_retained: 100000
  # How often (seconds) the retention sweep runs.
  cleanup_interval_seconds: 3600

dashboard:                # web dashboard / API server
  # Web server bind address, read by src/serve.py (the systemd ExecStart).
  # Override in local.yaml; takes effect on service restart.
  host: "0.0.0.0"
  port: 8080
  static_dir: "frontend"

metrics:                  # Prometheus-compatible /metrics scrape endpoint
  enabled: false
  require_auth: true

device:                   # this Meshpoint's identity and location (Meshradar fleet pin)
  device_name: "Meshpoint"
  # Registered coordinates shown on the Meshradar map. Static by default;
  # see location: below for live GPS instead.
  latitude: 0.0
  longitude: 0.0
  altitude: 25
  hardware_description: "RAK2287 + Raspberry Pi 4"
  firmware_version: "0.7.7"
  # device_id: auto-generated UUID on first "meshpoint setup" run, then
  # preserved across re-runs. Not normally hand-edited.

relay:                    # legacy USB-companion relay TX (superseded by transmit: below)
  enabled: false
  serial_port: null       # SX1262 relay radio, e.g. "/dev/ttyACM1"
  serial_baud: 115200
  max_relay_per_minute: 20
  burst_size: 5
  min_relay_rssi: -110.0
  max_relay_rssi: -50.0

upstream:                 # Meshradar cloud connection
  enabled: false
  url: "wss://api.meshradar.io"
  reconnect_interval_seconds: 10
  buffer_max_size: 5000        # local buffer during disconnects
  # API key from meshradar.io, set by "meshpoint setup". Required only
  # when enabled: true above -- validate_activation() skips the check
  # entirely when upstream is disabled.
  auth_token: null

transmit:                 # native LoRa TX (Meshtastic via SX1302, MeshCore via USB companion)
  enabled: false
  node_id: null             # auto-generated 4-byte Meshtastic node ID
  tx_power_dbm: 14          # conservative default (dBm)
  # max_duty_cycle_percent omitted: auto-derives from radio.region
  # (10% US/ANZ/KR/SG_923, 1% EU_868/IN). Override here to pin.
  long_name: "Meshpoint"
  short_name: "MPNT"
  hop_limit: 3
  nodeinfo:
    interval_minutes: 180      # 5..1440 min, default 180 (3 hr); 0 = disabled
    startup_delay_seconds: 60  # delay before first broadcast on boot
  telemetry:
    interval_minutes: 30
    startup_delay_seconds: 120
  position:
    interval_minutes: 15
    startup_delay_seconds: 180
    # LoRa mesh POSITION packets (Meshtastic app map). Meshradar fleet pin
    # always uses device.latitude/longitude above, not live GPS.
    coordinate_source: "static"   # static | live (live needs gpsd/uart source)
    location_precision: "approximate"  # exact | approximate | none (live only)

web_auth:                 # dashboard admin/viewer authentication
  # First-run state: hashes are empty -> dashboard forces /setup.
  # After setup, the admin hash is written via the API and the JWT
  # secret is auto-generated. Rotating jwt_secret (e.g. via
  # `meshpoint reset-password`) invalidates every active session.
  admin_password_hash: ""
  viewer_password_hash: ""
  jwt_secret: ""
  jwt_expiry_minutes: 60
  allow_read_only: false
  lockout_attempts: 5
  lockout_cooldown_minutes: 5
  session_version: 1

mqtt:                     # bridge captured packets to an MQTT broker (Meshtastic-compatible)
  enabled: false
  broker: "mqtt.meshtastic.org"
  port: 1883
  username: "meshdev"
  password: "large4cats"
  # Topic format is "<topic_root>/<region>/2/e/<channel>/<gateway_id>".
  # `topic_root` and `region` are concatenated with a slash, so leave
  # `topic_root` as "msh" and use `region` for the regional segment
  # (the Meshtastic spec). Setting topic_root to "msh/US/FL" while
  # leaving region="US" doubles the region: msh/US/FL/US/2/e/...
  # `mqtt.region` is independent of `radio.region`: defaults to "US".
  topic_root: "msh"
  region: "US"
  # Optional "!xxxxxxxx" override; blank uses an MD5 hash of device name.
  gateway_id: null
  publish_channels:
    - "LongFast"
    - "MeshCore"
  publish_json: false
  location_precision: "exact"
  homeassistant_discovery: false
  # Transport TLS is not implemented yet (plain TCP only) -- see CHANGELOG
  # "Unreleased". Leave tls_enabled off and use plain port 1883 or a LAN
  # broker without TLS until it lands.
  tls_enabled: false
  tls_ca_cert: ""

location:                 # GPS / location source
  # Where live GPS fixes come from (skyplot + optional mesh POSITION).
  # Registered coordinates for Meshradar live in device.latitude/longitude
  # and are not overwritten by gpsd.
  #   static : use device.latitude/longitude/altitude (default)
  #   gpsd   : poll a local or remote gpsd daemon for live fixes
  #   uart   : reserved (RAK Pi HAT GPS, not yet wired)
  source: "static"
  # gpsd connection. Defaults match the well-known local socket; only
  # change when running gpsd on a peer machine on the LAN.
  gpsd_host: "127.0.0.1"
  gpsd_port: 2947
  # How often the coordinator wakes to read the active source.
  update_interval_seconds: 5
  # Minimum acceptable fix mode: 0=any (incl. no-fix), 1=2D, 2=3D.
  min_fix_quality: 1

fan:                      # SenseCap M1 onboard fan control
  # Opt-in -- this hardware doesn't exist on RAK V2/Chameleon/DIY builds.
  # PWM-driven from CPU temperature; pin confirmed via
  # scripts/test_gpio_hardware.py fan-scan.
  enabled: false
  # BCM GPIO number. 13 is a hardware-PWM channel on the Pi 4 (BCM2711
  # PWM1) -- confirmed as this board's fan pin.
  gpio_pin: 13
  # Duty starts ramping up once CPU temp reaches this (Celsius).
  min_temp_c: 45.0
  # Duty reaches 100% at/above this (Celsius).
  max_temp_c: 65.0
  # Floor once ramping starts (0.0-1.0) -- most small fans stall below
  # some duty rather than actually spinning slower.
  min_duty: 0.35
  # Fan stays on until temp drops this many degrees below min_temp_c,
  # so it doesn't rapidly cycle on/off right at the threshold.
  hysteresis_c: 5.0
  # How often (seconds) to re-read CPU temp and adjust duty.
  poll_interval_s: 10.0

led:                      # SenseCap M1 onboard case LED
  # Opt-in -- same rationale as fan: above. Glanceable status: steady on
  # = all capture sources healthy, brief off-flicker = packet captured,
  # 1 Hz blink = a configured source is down, dark = service not running.
  enabled: false
  # BCM GPIO number; 22 confirmed as this board's LED via
  # scripts/test_gpio_hardware.py led.
  gpio_pin: 22
  # Dip the LED briefly for every captured packet. Set false for a
  # calm steady light that only signals health.
  activity_blink: true

repeater_poll:             # active polling of MeshCore repeaters you operate
  # Periodically query MeshCore repeaters you operate for their
  # status/telemetry (battery, uptime, airtime, packet counters, LPP
  # sensors) -- MeshCore nodes advertise identity only, so these stats
  # have to be asked for. Active two-way RF, so it's off by default and
  # targets a short list you have the login password for.
  enabled: false
  # How often (minutes) to poll each repeater. Floored at 1 minute.
  interval_minutes: 30
  # Repeaters to poll. key = public-key prefix (12 hex, == node_id);
  # password = the repeater's login password (needed for req_status).
  # The Repeaters page shows the repeater's real advertised name from
  # the contact roster automatically -- `name` is an optional override.
  # repeaters:
  #   - key: a1b2c3d4e5
  #     password: "your-repeater-password"
  #     name: "Repeatername"   # optional label; real advertised name used otherwise
  repeaters: []

button:                   # SenseCap M1 user button
  # Opt-in -- same rationale as fan:/led: above. Short press: advert on
  # every TX-capable radio (concentrator Meshtastic NodeInfo, MeshCore
  # companion advert, Meshtastic USB sticks), serialized 2s apart so the
  # overlapping 868 signals don't collide. Long press: restart the
  # meshpoint service.
  enabled: false
  # BCM GPIO number; 27 confirmed as this board's button via
  # scripts/test_gpio_hardware.py button-scan.
  gpio_pin: 27
  # Hold this many seconds to trigger the service restart. The status
  # LED (if enabled) blinks fast during the hold as a warning.
  hold_time_s: 3.0
  # Ignore further advert presses for this long after one fires, so a
  # bouncy button can't spam the duty-cycle budget. Denied presses get
  # a single long LED blink.
  advert_cooldown_s: 30.0

update_check:              # background check for a newer version on GitHub
  # Reuses the exact same git-fetch + commits-behind logic as the "Check
  # for updates" button on Settings -> Updates, so the sidebar badge and
  # the button always agree. Server-side, not per-browser: every client
  # sees the same state. On by default (read-only network check, low
  # impact); disable if you'd rather only check manually.
  enabled: true
  # How often (minutes) to check. Floored at 5 minutes -- each check
  # is a real `git fetch`, not a cheap request.
  interval_minutes: 60

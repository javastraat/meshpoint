#
# Configuration file for Meshpoint concentrator service.
#

radio:
  region: "US"
  # Frequency: set frequency_mhz (explicit MHz) OR slot (Meshtastic 1-indexed
  # slot number). frequency_mhz wins if both are present. If neither is set,
  # the regional default is used. Examples:
  #   frequency_mhz: 906.875
  #   slot: 20
  spreading_factor: 11
  bandwidth_khz: 250.0
  coding_rate: "4/5"
  sync_word: 0x2B
  preamble_length: 16
  tx_power_dbm: 22
  # Full-band spectrum sweep for the Hardware page spectrum card
  # (one ~50 ms scan per 100 kHz step; a few seconds per sweep).
  # 0 disables automatic sweeps ("Sweep now" button still works).
  spectrum_sweep_interval_seconds: 300

meshtastic:
  default_key_b64: "AQ=="
  primary_channel_name: "LongFast"
  # channel_keys:
  #   MyChannel: "base64encodedPSK=="
  #   SecretChat: "anotherBase64PSK=="
  channel_keys: {}

meshcore:
  default_key_b64: ""
  channel_keys: {}

capture:
  sources: []
  serial_port: null
  serial_baud: 115200
  concentrator_spi_device: "/dev/spidev0.0"
  meshcore_usb:
    serial_port: null
    baud_rate: 115200
    auto_detect: true

storage:
  database_path: "data/concentrator.db"
  max_packets_retained: 100000
  cleanup_interval_seconds: 3600

dashboard:
  # Web server bind address, read by src/serve.py (the systemd ExecStart).
  # Override in local.yaml; takes effect on service restart.
  host: "0.0.0.0"
  port: 8080
  static_dir: "frontend"

device:
  device_name: "Meshpoint"
  latitude: 0.0
  longitude: 0.0
  altitude: 25
  hardware_description: "RAK2287 + Raspberry Pi 4"
  firmware_version: "0.7.7"

relay:
  enabled: false
  serial_port: null       # SX1262 relay radio, e.g. "/dev/ttyACM1"
  serial_baud: 115200
  max_relay_per_minute: 20
  burst_size: 5
  min_relay_rssi: -110.0
  max_relay_rssi: -50.0

upstream:
  enabled: true
  url: "wss://api.meshradar.io"
  reconnect_interval_seconds: 10
  buffer_max_size: 5000
  auth_token: null

transmit:
  enabled: false
  node_id: null             # auto-generated 4-byte Meshtastic node ID
  tx_power_dbm: 14          # conservative default (dBm)
  # max_duty_cycle_percent omitted: auto-derives from radio.region
  # (10% US/ANZ/KR/SG_923, 1% EU_868/IN). Override here to pin.
  long_name: "Meshpoint"
  short_name: "MPNT"
  hop_limit: 3
  nodeinfo:
    interval_minutes: 180      # 5..1440 min, default 180 (3 hr); 0 = disabled
    startup_delay_seconds: 60  # delay before first broadcast on boot
  telemetry:
    interval_minutes: 30
    startup_delay_seconds: 120
  position:
    interval_minutes: 15
    startup_delay_seconds: 180
    # LoRa mesh POSITION packets (Meshtastic app map). Meshradar fleet pin
    # always uses device.latitude/longitude above, not live GPS.
    coordinate_source: "static"   # static | live (live needs gpsd/uart source)
    location_precision: "approximate"  # exact | approximate | none (live only)

web_auth:
  # First-run state: hashes are empty -> dashboard forces /setup.
  # After setup, the admin hash is written via the API and the JWT
  # secret is auto-generated. Rotating jwt_secret (e.g. via
  # `meshpoint reset-password`) invalidates every active session.
  admin_password_hash: ""
  viewer_password_hash: ""
  jwt_secret: ""
  jwt_expiry_minutes: 60
  allow_read_only: false
  lockout_attempts: 5
  lockout_cooldown_minutes: 5
  session_version: 1

mqtt:
  enabled: false
  broker: "mqtt.meshtastic.org"
  port: 1883
  username: "meshdev"
  password: "large4cats"
  # Topic format is "<topic_root>/<region>/2/e/<channel>/<gateway_id>".
  # `topic_root` and `region` are concatenated with a slash, so leave
  # `topic_root` as "msh" and use `region` for the regional segment
  # (the Meshtastic spec). Setting topic_root to "msh/US/FL" while
  # leaving region="US" doubles the region: msh/US/FL/US/2/e/...
  # `mqtt.region` is independent of `radio.region`: defaults to "US".
  topic_root: "msh"
  region: "US"
  publish_channels:
    - "LongFast"
    - "MeshCore"
  publish_json: false
  location_precision: "exact"
  homeassistant_discovery: false

location:
  # Where live GPS fixes come from (skyplot + optional mesh POSITION).
  # Registered coordinates for Meshradar live in device.latitude/longitude
  # and are not overwritten by gpsd.
  #   static : use device.latitude/longitude/altitude (default)
  #   gpsd   : poll a local or remote gpsd daemon for live fixes
  #   uart   : reserved (RAK Pi HAT GPS, not yet wired)
  source: "static"
  # gpsd connection. Defaults match the well-known local socket; only
  # change when running gpsd on a peer machine on the LAN.
  gpsd_host: "127.0.0.1"
  gpsd_port: 2947
  # How often the coordinator wakes to read the active source.
  update_interval_seconds: 5
  # Minimum acceptable fix mode: 0=any (incl. no-fix), 1=2D, 2=3D.
  min_fix_quality: 1

fan:
  # SenseCap M1 onboard fan (opt-in -- this hardware doesn't exist on
  # RAK V2/Chameleon/DIY builds). PWM-driven from CPU temperature; pin
  # confirmed via scripts/test_gpio_hardware.py fan-scan.
  enabled: false
  # BCM GPIO number. 13 is a hardware-PWM channel on the Pi 4 (BCM2711
  # PWM1) -- confirmed as this board's fan pin.
  gpio_pin: 13
  # Duty starts ramping up once CPU temp reaches this (Celsius).
  min_temp_c: 45.0
  # Duty reaches 100% at/above this (Celsius).
  max_temp_c: 65.0
  # Floor once ramping starts (0.0-1.0) -- most small fans stall below
  # some duty rather than actually spinning slower.
  min_duty: 0.35
  # Fan stays on until temp drops this many degrees below min_temp_c,
  # so it doesn't rapidly cycle on/off right at the threshold.
  hysteresis_c: 5.0
  # How often (seconds) to re-read CPU temp and adjust duty.
  poll_interval_s: 10.0

led:
  # SenseCap M1 onboard case LED (opt-in -- same rationale as fan:).
  # Glanceable status: steady on = all capture sources healthy, brief
  # off-flicker = packet captured, 1 Hz blink = a configured source is
  # down, dark = service not running.
  enabled: false
  # BCM GPIO number; 22 confirmed as this board's LED via
  # scripts/test_gpio_hardware.py led.
  gpio_pin: 22
  # Dip the LED briefly for every captured packet. Set false for a
  # calm steady light that only signals health.
  activity_blink: true
